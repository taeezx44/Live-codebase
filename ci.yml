# ============================================================
# .github/workflows/ci.yml
#
# Runs on every push to main and every PR.
# Jobs:
#   typecheck  — tsc --noEmit across all packages
#   test       — vitest across all packages (with Redis + PG)
#   build      — production build (verifies nothing breaks)
#   docker     — build Docker images (no push on PRs)
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # cancel older runs on new push

jobs:

  # ── Typecheck ───────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # ── Tests ────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       codevis_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      DATABASE_URL:    postgres://postgres:postgres@localhost:5432/codevis_test
      REDIS_URL:       redis://localhost:6379
      NEO4J_URI:       bolt://localhost:7687
      NEO4J_USER:      neo4j
      NEO4J_PASSWORD:  password
      NODE_ENV:        test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply test DB schema
        run: |
          psql $DATABASE_URL -f infra/migrations/postgres/001_init.sql

      - run: pnpm test -- --reporter=verbose

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: packages/*/coverage/

  # ── Build ────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist/
          retention-days: 7

  # ── Docker build (verify images build correctly) ─────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          tags: codevis/api:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/worker.Dockerfile
          push: false
          tags: codevis/worker:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
